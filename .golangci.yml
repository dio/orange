version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true

formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/dio/orange)
      custom-order: true
