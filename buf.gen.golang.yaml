version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/dio/orange/api
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.10
    out: api
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: api
    opt: paths=source_relative
  - remote: buf.build/community/planetscale-vtprotobuf:v0.6.0
    out: api
    opt:
      - paths=source_relative
      - features=marshal+unmarshal+size
