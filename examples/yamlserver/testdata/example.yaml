providers:
  - id: openai
    kind: openai
    endpoint: https://api.openai.com
    secret_ref: env://OPENAI_API_KEY
    auth_type: bearer
    path_prefix: /v1
  - id: anthropic
    kind: anthropic
    endpoint: https://api.anthropic.com
    secret_ref: vault://orange/anthropic
    auth_type: bearer
models:
  - id: gpt-4o-mini
    provider: openai
    name: gpt-4o-mini
    mode: chat
    capabilities: [function_calling, tool_choice]
    metadata_json: '{"context_window":128000}'
  - id: claude-haiku
    provider: anthropic
    name: claude-3-5-haiku-latest
    mode: chat
    capabilities: [tool_choice]
  - id: fallback-chat
    provider: openai
    name: gpt-4o-mini
mcp_servers:
  - id: github
    endpoint: https://mcp.github.example
    secret_ref: sm://github-token
    auth_type: bearer
scopes:
  - id: prod
    principals:
      - slug: "slug:alice"
        model_routes:
          gpt-4o-mini:
            kind: target
            provider: openai
            model: gpt-4o-mini
            secret_ref: orange://alice/openai
          claude-haiku:
            kind: chain
            retry:
              retry_on: 401,403,5xx
              per_try_timeout_ms: 2500
            children:
              - kind: target
                provider: anthropic
                model: claude-haiku
              - kind: target
                provider: openai
                model: fallback-chat
          fallback-chat:
            kind: split
            split:
              - weight: 80
                plan:
                  kind: target
                  provider: openai
                  model: gpt-4o-mini
              - weight: 20
                plan:
                  kind: target
                  provider: anthropic
                  model: claude-haiku
        rate:
          usd_per_day_cents: 1000
          rpm: 60
          on_exceed: reject
      - slug: "slug:bob"
        route:
          kind: target
          provider: openai
          model: gpt-4o-mini
        rate:
          usd_per_day_cents: 500
          rpm: 30
          on_exceed: queue
    mcp_profiles:
      - path: github
        tools:
          - exposed_name: github__list_repos
            server: github
            tool: list_repos
            secret_ref: sm://github-token
            auth_type: bearer
