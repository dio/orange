syntax = "proto3";

package orange.config.v1;

import "buf/validate/validate.proto";
import "orange/auth/v1/auth_options.proto";
import "orange/config/v1/snapshot.proto";

service SnapshotService {
  // Fetch is the unary cold-start or reconnect path.
  // When last_version and last_checksum both still match the current snapshot,
  // the server returns Unchanged. Otherwise it returns the current envelope.
  rpc Fetch(FetchRequest) returns (FetchResponse) {
    option (orange.auth.v1.auth) = {
      auth_types: [AUTH_TYPE_CLIENT_ASSERTION]
    };
  }
}

// FetchRequest is the unary cold-start or reconnect path. When both
// last_version and last_checksum still match the server's current snapshot,
// the server replies with Unchanged. Send last_version = 0 and omit
// last_checksum for an unconditional fetch.
message FetchRequest {
  // last_version is the highest version the client has applied; 0 = unconditional.
  uint64 last_version = 2;

  // last_checksum is the SHA-256 of the last accepted decompressed payload.
  // When present it must be exactly 32 bytes. Omit (leave empty) for an
  // unconditional fetch or when last_version alone is sufficient.
  bytes last_checksum = 3 [(buf.validate.field).cel = {
    id: "fetch_checksum_sha256_len"
    message: "last_checksum must be empty or exactly 32 bytes (SHA-256)"
    expression: "this.size() == 0 || this.size() == 32"
  }];
}

message FetchResponse {
  oneof result {
    option (buf.validate.oneof).required = true;

    SnapshotEnvelope snapshot = 1; // current snapshot (version or checksum changed)
    Unchanged unchanged = 2; // version and checksum still match; no payload
  }
}

// Unchanged is returned by Fetch when the client's snapshot is already current.
message Unchanged {}
