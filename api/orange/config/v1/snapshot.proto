syntax = "proto3";

package orange.config.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// SnapshotEnvelope is the outermost frame delivered over gRPC or HTTP.
// Payload contains a compressed (or raw) ConfigPayload proto bytes.
message SnapshotEnvelope {
  uint64 version = 1; // monotonically increasing; receiver discards if <= last accepted
  bytes payload = 4; // compressed ConfigPayload proto bytes
  bytes checksum = 5; // SHA-256 of the decompressed payload bytes
}

// ConfigPayload is the typed wrapper for bundle bytes and their metadata.
// Stored as the payload field of SnapshotEnvelope (optionally compressed).
message ConfigPayload {
  uint32 schema_version = 1 [(buf.validate.field).uint32.gt = 0];
  PayloadFormat format = 2;
  bytes payload = 3 [(buf.validate.field).bytes.min_len = 1];
  SnapshotMetadata metadata = 4;
}

// PayloadFormat describes the encoding of the bundle bytes in ConfigPayload.payload.
message PayloadFormat {
  string media_type = 1 [(buf.validate.field).string.min_len = 1];
  string encoding = 2 [(buf.validate.field).string.min_len = 1];
  string format_version = 3;
}

// SnapshotMetadata carries diagnostic and routing information for a snapshot.
// Fields are opaque labels; no secret values, tenant keys, or user identifiers.
message SnapshotMetadata {
  string producer = 1;
  string source_revision = 2;
  google.protobuf.Timestamp created_at = 3;
  string lane = 4;
  string scope_kind = 5;
  string scope_id = 6;
  repeated string scopes = 7;
  uint64 payload_size = 8;
  bytes payload_sha256 = 9 [(buf.validate.field).cel = {
    id: "metadata_sha256_len"
    message: "payload_sha256 must be empty or exactly 32 bytes (SHA-256)"
    expression: "this.size() == 0 || this.size() == 32"
  }];
}

// MappedSplitSnapshot is the typed SoTW map for Cherry mapped-split delivery.
// Component bundle bytes are still fetched as ConfigPayload snapshots through
// SnapshotService.FetchMappedSplitBundle using the resource named by each
// bundle ref.
message MappedSplitSnapshot {
  uint64 version = 1; // monotonically increasing map version
  bytes checksum = 2 [(buf.validate.field).cel = {
    id: "mapped_split_checksum_sha256_len"
    message: "checksum must be exactly 32 bytes (SHA-256)"
    expression: "this.size() == 32"
  }];
  MappedSplitMap map = 3;
}

// MappedSplitMap describes every current component bundle for one authenticated
// lane. It is SoTW: omitted component refs are removed from the active view.
message MappedSplitMap {
  string format_version = 1;
  string scope_kind = 2;
  string scope_id = 3;
  repeated string scopes = 4;
  string generation_id = 5;
  uint64 map_revision = 6;
  string llm_default_principal_slug = 7;
  map<string, MappedSplitPartitionSpec> partitioning = 8;
  map<string, MappedSplitBundleRef> bundles = 9;
  map<string, MappedSplitPartitionBundleRefs> partition_bundles = 10;
}

// MappedSplitPartitionSpec describes deterministic cohorting for a partitioned lane.
message MappedSplitPartitionSpec {
  string algorithm = 1;
  string key = 2;
  uint32 partitions = 3;
}

// MappedSplitBundleRef identifies one component bundle resource.
message MappedSplitBundleRef {
  string id = 1;
  string resource = 2;
  string component = 3;
  uint64 checksum = 4;
  uint64 size = 5;
}

// MappedSplitPartitionBundleRef identifies one partitioned component bundle.
message MappedSplitPartitionBundleRef {
  uint32 partition = 1;
  MappedSplitBundleRef ref = 2;
}

// MappedSplitPartitionBundleRefs wraps repeated refs because proto maps cannot
// use repeated fields as map values.
message MappedSplitPartitionBundleRefs {
  repeated MappedSplitPartitionBundleRef refs = 1;
}
