syntax = "proto3";

package orange.config.admin.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "orange/auth/v1/auth_options.proto";

service ConfigAdminService {
  // PublishSnapshot stores a new compiled config snapshot and broadcasts it to
  // connected data-plane proxies via the SnapshotService Watch stream.
  rpc PublishSnapshot(PublishSnapshotRequest) returns (PublishSnapshotResponse) {
    option (orange.auth.v1.auth) = {
      auth_types: [AUTH_TYPE_API_KEY]
      scopes: ["admin"]
    };
  }
}

message PublishSnapshotRequest {}

message PublishSnapshotResponse {}
